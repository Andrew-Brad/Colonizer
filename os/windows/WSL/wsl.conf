# Colonizer WSL distro config (copied to /etc/wsl.conf inside Ubuntu)
# Reference: https://learn.microsoft.com/windows/wsl/wsl-config

[boot]
systemd=true

[automount]
enabled=true
options="metadata,umask=22,fmask=11"
mountFsTab=true

[interop]
enabled=true
appendWindowsPath=true

[user]
default=andrew
